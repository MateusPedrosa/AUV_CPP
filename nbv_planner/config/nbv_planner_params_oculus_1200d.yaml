# NBV Planner Parameters
nbv_planner_node:
  ros__parameters:
    map_frame: "odom"
    robot_frame: "base_link"
    octree_resolution: 0.1
    planning_frequency: 0.5
    exploration_sensor_max_range: 10.0
    exploration_sensor_min_range: 0.1
    max_free_space: 0.0
    min_height_free_space: 0.0
    exploration_sensor_hfov: 2.2689  # 130 deg in rad
    exploration_sensor_vfov: 0.2094  # 12 deg in rad
    inspection_sensor_frames: ["camera_forward_link", "camera_bottom_link"]
    exploration_sensor_frame: "sonar_link"
    camera_fx: 731.79
    camera_fy: 731.79
    camera_cx: 970.94
    camera_cy: 600.37
    camera_width: 1216
    camera_height: 1936
    camera_max_range: 2.0
    cloud_topic: "/sonar_point_cloud"

# Sonar Point Cloud Node Parameters
sonar_point_cloud:
  ros__parameters:
    sonar_topic: "/blueye/sensor/sonar/ping"
    pose_topic: "/blueye/sensor/ekf/pose"
    resolution: 0.1
    max_range: 10.0
    min_range: 0.1
    horizontal_fov: 60.0
    vertical_fov: 12.0
    min_intensity_short_range: 0.1
    min_intensity_long_range: 0.1
    filter_window_size: 7
    filter_distance_threshold: 2.0
    morph_close_radius: 2
    polar_image_size: 800
    image_publish_every: 0
    min_consecutive_empty_beams: 50
    use_sim_time: true

sonar_tf_publisher:
  ros__parameters:
    use_sim_time: true
    pitch_topic: "/blueye/sensor/sonar/servo_angle"
    sonar_frame: "sonar_link"
    robot_frame: "base_link"
    translation_x: 0.2
    translation_y: 0.0
    translation_z: 0.08